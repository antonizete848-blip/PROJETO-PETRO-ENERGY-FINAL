
<section class="detalhe">

  <div class="detalhe-topo">
    <span>{{ servico.etiqueta }}</span>
    <h1>{{ servico.titulo }}</h1>
    <p class="descricao">
      {{ servico.descricao }}
    </p>

  </div>

  <div class="info-grid">

    <div class="info">

      <h2>Sobre o serviço</h2>
      <p>{{ servico.conteudo }}</p>

    </div>

    <div class="info">

      <h2>{{ servico.beneficiosTitulo }}</h2>
      <p>{{ servico.beneficios }}</p>

    </div>

    <div class="info">

      <h2>{{ servico.processoTitulo }}</h2>
      <p>{{ servico.processo }}</p>

    </div>

    <div class="info">

      <h2>{{ servico.resultadoTitulo }}</h2>
      <p>{{ servico.resultado }}</p>

    </div>
  </div>
</section>
